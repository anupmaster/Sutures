[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sutures-generic"
version = "0.1.0a1"
description = "Sutures generic adapter — framework-agnostic breakpoints for AI agents"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "Anup Karanjkar", email = "anup@anupkaranjkar.com" },
]
keywords = ["ai", "agents", "debugging", "breakpoints", "tracing", "framework-agnostic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Debuggers",
]
dependencies = [
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]

[project.urls]
Homepage = "https://github.com/anupmaster/Sutures"
Repository = "https://github.com/anupmaster/Sutures"

[tool.hatch.build.targets.wheel]
packages = ["src/sutures_generic"]

[tool.ruff]
target-version = "py310"
line-length = 100

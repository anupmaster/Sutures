[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sutures-langgraph"
version = "0.1.0a1"
description = "Sutures LangGraph adapter — breakpoints for AI agents"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "Anup Karanjkar", email = "anup@anupkaranjkar.com" },
]
keywords = ["ai", "agents", "debugging", "langgraph", "breakpoints", "tracing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Debuggers",
]
dependencies = [
    "websockets>=12.0",
    "langgraph>=1.0",
    "langchain-core>=0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/anupmaster/Sutures"
Documentation = "https://github.com/anupmaster/Sutures#readme"
Repository = "https://github.com/anupmaster/Sutures"

[tool.hatch.build.targets.wheel]
packages = ["src/sutures_langgraph"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "ANN", "B", "SIM"]
ignore = ["ANN101", "ANN102", "ANN401"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

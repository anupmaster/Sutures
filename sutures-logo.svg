<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" stroke="#10B981" stroke-width="2" fill="#0F172A"/>
  
  <!-- Surgical needle (curved) -->
  <path d="M 35 85 Q 25 60 40 40 Q 55 20 75 30" stroke="#10B981" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Needle point -->
  <circle cx="75" cy="30" r="2.5" fill="#10B981"/>
  
  <!-- Thread/suture lines (tracing connections between nodes) -->
  <path d="M 35 85 C 45 75 55 80 60 70 S 75 65 80 55 S 85 45 75 30" stroke="#6EE7B7" stroke-width="1.5" stroke-linecap="round" fill="none" stroke-dasharray="4 3"/>
  
  <!-- Agent nodes along the thread -->
  <circle cx="35" cy="85" r="5" fill="#10B981" opacity="0.9"/>
  <circle cx="60" cy="70" r="4" fill="#34D399" opacity="0.8"/>
  <circle cx="80" cy="55" r="4" fill="#6EE7B7" opacity="0.8"/>
  
  <!-- Breakpoint indicator (red dot) -->
  <circle cx="60" cy="70" r="7" stroke="#EF4444" stroke-width="2" fill="none"/>
  <circle cx="60" cy="70" r="2" fill="#EF4444"/>
  
  <!-- Pulse animation rings -->
  <circle cx="60" cy="70" r="10" stroke="#EF4444" stroke-width="0.5" fill="none" opacity="0.4"/>
</svg>
